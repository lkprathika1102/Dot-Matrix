<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOT-MATRIX // SYSTEM</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <div id="shell">
        <header id="bar">
            <div class="group">
                <span class="label">COORD:</span>
                <span id="coord-val" class="value">0, 0</span>
            </div>
            <div class="group">
                <span class="label">NODES:</span>
                <span id="node-val" class="value">0</span>
            </div>
            <div class="group">
                <button id="clear-btn" class="ui-btn">ERASE</button>
            </div>
            <div class="group" style="margin-left: auto;">
                <input type="checkbox" id="toggle-gen" checked>
                <span class="label">AUTO_GEN</span>
            </div>
        </header>
        <main id="workspace">
            <div id="canvas-container">
                <canvas id="main-viewport"></canvas>
            </div>
        </main>
    </div>
    <script src="engine.js"></script>
    <script src="app.js"></script>
</body>
</html>

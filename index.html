<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOT-MATRIX // SYSTEM</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <div id="shell">
        <header id="bar">
            <div class="group">
                <span class="label">COORD:</span>
                <span id="coord-val" class="value">0, 0</span>
            </div>
            <div class="group">
                <span class="label">NODES:</span>
                <span id="node-val" class="value">0</span>
            </div>
            <div class="group" style="margin-left: auto;">
                <span id="sys-status" class="value">SYSTEM_READY</span>
            </div>
        </header>
        <main id="workspace">
            <div id="canvas-container">
                <canvas id="main-viewport"></canvas>
            </div>
            <aside id="telemetry-deck">
                <div class="panel">
                    <div class="panel-header">SYSTEM_LOG</div>
                    <div id="log-output" class="log-content"></div>
                </div>
                <div class="panel">
                    <div class="panel-header">CORE_METRICS</div>
                    <div id="metrics-readout" class="metrics-content"></div>
                </div>
            </aside>
        </main>
    </div>
    <script src="engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
